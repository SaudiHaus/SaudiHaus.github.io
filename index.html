<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaudiHaus</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    header {
      background: white;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #e5e5e5;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 8px 0 0;
      color: #666;
    }

    .hero {
      background: #eaf6ea;
      margin: 24px;
      padding: 32px 20px;
      border-radius: 16px;
      text-align: center;
    }

    .hero h2 {
      margin-top: 0;
      font-size: 28px;
    }

    .products {
      padding: 0 24px 40px;
    }

    .products h2 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 16px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .price {
      color: #1c8c3a;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .btn {
      display: inline-block;
      background: #1c8c3a;
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <header>
    <h1>SaudiHaus</h1>
    <p>Original Saudi Products in Egypt</p>
  </header>

  <section class="hero">
    <h2>Imported from Saudi Arabia</h2>
    <p>Perfumes, bakhoor, personal care, and more.</p>
  </section>

  <section class="products">
    <h2>Featured Products</h2>

    <!-- المنتجات هتتحط هنا ديناميك -->
    <div class="grid" id="products"></div>
  </section>

  <script>
    const phone = "201066064010"; // حط رقمك هنا

    fetch("products.json")
      .then(res => res.json())
      .then(products => {
        const container = document.getElementById("products");

        products.forEach(product => {
          const message = encodeURIComponent(
            `عايز أطلب ${product.name} بسعر ${product.price} جنيه`
          );

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${product.image}" alt="${product.name}">
            <div class="card-content">
              <h3>${product.name}</h3>
              <div class="price">${product.price} EGP</div>
              <a class="btn" href="https://wa.me/${phone}?text=${message}" target="_blank">
                اطلب الآن
              </a>
            </div>
          `;

          container.appendChild(card);
        });
      });
  </script>

</body>
</html>
